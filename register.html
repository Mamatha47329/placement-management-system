<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Student Registration</h2>

<form th:action="@{/register}"
      th:object="${student}"
      method="post">

<input type="text"
       th:field="*{fullName}"
       class="form-control mb-3"
       placeholder="Full Name">

<input type="email"
       th:field="*{email}"
       class="form-control mb-3"
       placeholder="Email">

<input type="text"
       th:field="*{phone}"
       class="form-control mb-3"
       placeholder="Phone">

<input type="text"
       th:field="*{branch}"
       class="form-control mb-3"
       placeholder="Branch">

<input type="number"
       step="0.01"
       th:field="*{cgpa}"
       class="form-control mb-3"
       placeholder="CGPA">

<input type="number"
       th:field="*{graduationYear}"
       class="form-control mb-3"
       placeholder="Graduation Year">

<input type="password"
       th:field="*{password}"
       class="form-control mb-3"
       placeholder="Password">

<button class="btn btn-success">

Register

</button>

</form>

</div>

</body>
</html>
