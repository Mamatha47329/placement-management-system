<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Job Applications</h2>

    <table class="table table-bordered">

        <thead class="table-info">

        <tr>

            <th>ID</th>
            <th>Student</th>
            <th>Job</th>
            <th>Date</th>
            <th>Status</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="application : ${applications}">

            <td th:text="${application.id}"></td>

            <td th:text="${application.student.fullName}"></td>

            <td th:text="${application.job.title}"></td>

            <td th:text="${application.applicationDate}"></td>

            <td>

                <span class="badge bg-warning"
                      th:text="${application.status}">
                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
